<div class="note-card">

  @if(!isEditing) {

    <h3>{{ note.title }}</h3>

    <p>{{ note.body }}</p>

    <small>{{ note.date }}</small>

    <div class="actions">

      <button (click)="startEdit()">
        Edit
      </button>

      <button (click)="deleteNote()">
        Delete
      </button>

      <button (click)="togglePin()">

        @if(note.pinned) {
          Unpin
        }

        @else {
          Pin
        }

      </button>

    </div>

  }

  @else {

    <div class="edit-section">

      <input
        type="text"
        [(ngModel)]="editedTitle"
        placeholder="Edit title..."
      />

      <textarea
        [(ngModel)]="editedBody"
        placeholder="Edit note..."
      ></textarea>

      <button (click)="saveEdit()">
        Save
      </button>

    </div>

  }

</div>
