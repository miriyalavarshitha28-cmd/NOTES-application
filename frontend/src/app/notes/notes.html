<div [class.dark]="darkMode()">

  <div class="container">

    <!-- HEADER -->

    <div class="top-actions">

      <div class="left-actions">

        <button
          class="theme-btn"
          (click)="toggleTheme()">

          @if (darkMode()) {
            Dark Mode
          } @else {
            Light Mode
          }

        </button>

      </div>

      <div class="title-section">

        <h1>Notes App</h1>

      </div>

      <div class="right-actions">

        <button
          type="button"
          routerLink="/notes">
          Home
        </button>

        <button
          type="button"
          routerLink="/all-notes">
          All Notes
        </button>

        <button
          type="button"
          routerLink="/profile">
          Profile
        </button>

        <button
          type="button"
          routerLink="/settings">
          Settings
        </button>

        <button
          type="button"
          class="logout-btn"
          (click)="logout()">
          Logout
        </button>

      </div>

    </div>

    <!-- ADD NOTE SECTION -->

    <div class="add-section">

      <div class="note-form">

        <!-- TITLE -->

        <div class="title-wrapper">

          <input
            type="text"
            [(ngModel)]="newTitle"
            placeholder="Enter title..." />

          <button
            type="button"
            class="mic-btn"
            aria-label="Start voice input for title"
            (click)="startVoiceInput('title')">
            <svg
              viewBox="0 0 24 24"
              aria-hidden="true">
              <path
                d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
              <path
                d="M17.3 11c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.3 6-6.72h-1.7z" />
            </svg>
          </button>

        </div>

        <!-- BODY + ADD BUTTON -->

        <div class="body-row">

          <div class="body-wrapper">

            <textarea
              [(ngModel)]="newBody"
              placeholder="Write your note...">
            </textarea>

            <button
              type="button"
              class="mic-btn"
              aria-label="Start voice input for note body"
              (click)="startVoiceInput('body')">
              <svg
                viewBox="0 0 24 24"
                aria-hidden="true">
                <path
                  d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                <path
                  d="M17.3 11c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.3 6-6.72h-1.7z" />
              </svg>
            </button>

          </div>

          <button
            type="button"
            class="add-btn"
            (click)="addNote()">
            Add Note
          </button>

        </div>

      </div>

    </div>

    <!-- MESSAGE -->

    @if (noteMessage) {

      <div class="message-row">

        {{ noteMessage }}

      </div>

    }

    <!-- PINNED NOTES -->

    <h2 class="notes-heading">


    </h2>

    <div class="notes-container">

      @for (
        note of pinnedNotes();
        track note.id
      ) {

        <app-note
          [note]="note"
          (deleteEvent)="deleteNote($event)"
          (editEvent)="editNote($event)"
          (pinEvent)="togglePin($event)">
        </app-note>

      }

    </div>

  </div>

</div>
