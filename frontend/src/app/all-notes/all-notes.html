<div
  class="container"
  (window:scroll)="onScroll()">

  <h1>All Notes</h1>

  <div class="search-section">
    <input
  type="text"
  [ngModel]="searchText()"
  (ngModelChange)="searchText.set($event)"
  placeholder="Search notes..."
/>
  </div>

  <div class="notes-container">

    @for (
      note of filteredNotes();
      track note.id
    ) {

      <div class="note-card">

        <h3>{{ note.title }}</h3>

        @if (note.pinned) {
          <small>Pinned</small>
        }

        <p>{{ note.body }}</p>

        <small>
          {{
            note.createdAt
              ? (note.createdAt | date:'medium')
              : ''
          }}
        </small>

        <div class="actions">

          <button
            type="button"
            (click)="editNote(note)">
            Edit
          </button>

          <button
            type="button"
            (click)="deleteNote(note.id)">
            Delete
          </button>

          <button
            type="button"
            (click)="pinNote(note)">
            {{ note.pinned ? 'Unpin' : 'Pin' }}
          </button>

        </div>

      </div>

    }

  </div>

  <button
    type="button"
    routerLink="/notes">
    Back to Notes
  </button>

</div>
