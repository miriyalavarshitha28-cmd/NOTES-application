<div class="container">
  <div class="page-header">
    <div class="header-title">
      <h1>Profile</h1>
    </div>
    <button
  type="button"
  class="nav-btn"
  routerLink="/notes">
  Back to Notes
</button>
  </div>

  <section class="page-card">
    <form (ngSubmit)="saveProfile()">
      <div class="detail-grid">
      <div class="detail-item">
        <label for="fullName">Full Name</label>
        <input id="fullName" name="fullName" [(ngModel)]="profile.fullName" />
      </div>
      <div class="detail-item">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" [(ngModel)]="profile.email" />
      </div>
      <div class="detail-item">
        <label for="username">Username</label>
        <input id="username" name="username" [(ngModel)]="profile.username" />
      </div>
      <div class="detail-item">
        <label for="plan">Plan</label>
        <input id="plan" name="plan" [(ngModel)]="profile.plan" />
      </div>
      <div class="detail-item">
        <label for="joined">Joined</label>
        <input id="joined" name="joined" [(ngModel)]="profile.joined" />
      </div>
      <div class="detail-item">
        <label for="favoriteColor">Favorite Color</label>
        <input id="favoriteColor" name="favoriteColor" [(ngModel)]="profile.favoriteColor" />
      </div>
      </div>

      <p class="form-message" *ngIf="message">{{ message }}</p>

      <div class="form-actions">
        <button type="submit" [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : 'Save Profile' }}
        </button>
      </div>
    </form>
  </section>
</div>
