<div class="container">

  <div class="page-header">

    <div class="header-title">
      <h1>Settings</h1>
    </div>

    <button
  type="button"
  class="nav-btn"
  routerLink="/notes">
  Back to Notes
</button>

  </div>

  <section class="page-card">

    <form (ngSubmit)="saveSettings()">
      <div class="detail-grid">

      <div class="detail-item">
        <label for="language">Language</label>
        <select id="language" name="language" [(ngModel)]="settings.language">
          <option value="English">English</option>
          <option value="Hindi">Hindi</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
        </select>
      </div>

      <div class="detail-item">
        <label for="notifications">Notifications</label>
        <select
          id="notifications"
          name="notifications"
          [(ngModel)]="settings.notifications">
          <option [ngValue]="true">Enabled</option>
          <option [ngValue]="false">Disabled</option>
        </select>
      </div>

      <div class="detail-item">
        <label>Theme</label>

        <div class="theme-options">

          <label>
            <input
              type="radio"
              name="theme"
              value="light"
              [(ngModel)]="theme"
            />
            Light Mode
          </label>

          <label>
            <input
              type="radio"
              name="theme"
              value="dark"
              [(ngModel)]="theme"
            />
            Dark Mode
          </label>

        </div>

      </div>

      <div class="detail-item">
        <label for="autosave">Autosave</label>
        <select id="autosave" name="autosave" [(ngModel)]="settings.autosave">
          <option value="On">On</option>
          <option value="Off">Off</option>
        </select>
      </div>

      <div class="detail-item">
        <label for="privacy">Privacy</label>
        <select id="privacy" name="privacy" [(ngModel)]="settings.privacy">
          <option value="Standard">Standard</option>
          <option value="Private">Private</option>
          <option value="Public">Public</option>
        </select>
      </div>

      <div class="detail-item">
        <label for="reminderEmails">Reminder Emails</label>
        <select
          id="reminderEmails"
          name="reminderEmails"
          [(ngModel)]="settings.reminderEmails">
          <option [ngValue]="true">On</option>
          <option [ngValue]="false">Off</option>
        </select>
      </div>

      <div class="detail-item" *ngIf="createdAt">
        <label>Created At</label>
        <strong>{{ createdAt }}</strong>
      </div>

      <div class="detail-item" *ngIf="updatedAt">
        <label>Updated At</label>
        <strong>{{ updatedAt }}</strong>
      </div>

      </div>

      <p class="form-message" *ngIf="message">{{ message }}</p>

      <div class="form-actions">

        <button type="submit" [disabled]="isSaving">

          {{ isSaving ? 'Saving...' : 'Save Settings' }}

        </button>

      </div>
    </form>
  </section>

</div>
